databases:
  - name: ai-market-scanner-db
    plan: free
    databaseName: marketscanner
    user: marketscanner

services:
  - type: web
    name: ai-market-scanner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --worker-class gthread --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-market-scanner-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SCAN_CACHE_TTL_MINUTES
        value: 180
      - key: DEEP_ANALYSIS_LIMIT
        value: 75
      - key: FINAL_PICK_LIMIT
        value: 10
      - key: PREDICTION_LOCK_ENABLED
        value: true
      - key: ACCURACY_CHECK_ON_SCAN
        value: true
      - key: MIN_BUY_CONFIDENCE
        value: 60
      - key: MIN_BUY_RISK_REWARD
        value: 1.4
      - key: FIRST_SCAN_RUNNING_TIMEOUT_MINUTES
        value: 120
      - key: VERIFY_AFTER_CLOSE_DELAY_MINUTES
        value: 15
      - key: LESSON_LOOKBACK_DAYS
        value: 90
      - key: ANTHROPIC_INPUT_USD_PER_MILLION
        value: 2
      - key: ANTHROPIC_OUTPUT_USD_PER_MILLION
        value: 10
      - key: USD_INR_RATE
        value: 95
      - key: TRADING_ENABLED
        value: true
      - key: AUTO_TRADING_MODE
        value: paper
      - key: LIVE_TRADING_ENABLED
        value: false
      - key: TRADING_DEFAULT_CAPITAL_INR
        value: 5000
      - key: TRADING_WEEKLY_PROFIT_TARGET_PCT
        value: 10
      - key: TRADING_MAX_WEEKLY_LOSS_PCT
        value: 4
      - key: TRADING_COVER_API_COSTS_FROM_PROFIT
        value: true
      - key: TRADING_STOP_AFTER_WEEKLY_TARGET
        value: true
      - key: TRADING_STOP_AFTER_WEEKLY_LOSS
        value: true
      - key: TRADING_MAX_POSITION_PCT
        value: 25
      - key: TRADING_RISK_PER_TRADE_PCT
        value: 2
      - key: TRADING_MAX_OPEN_POSITIONS
        value: 3
      - key: TRADING_MIN_CONFIDENCE
        value: 65
      - key: TRADING_MIN_RISK_REWARD
        value: 1.5
      - key: TRADING_SELECTION_MODE
        value: auto
      - key: TRADING_SELF_SCAN_UNIVERSE_LIMIT
        value: 150
      - key: TRADING_SELF_SCAN_MIN_SCORE
        value: 55
      - key: INTRADAY_DYNAMIC_UNIVERSE_ENABLED
        value: true
      - key: INTRADAY_PRE_SCAN_POOL_LIMIT
        value: 300
      - key: INTRADAY_AUTO_ENABLED
        value: true
      - key: INTRADAY_SERVER_AUTO_ON_START
        value: true
      - key: INTRADAY_AUTO_INTERVAL_SECONDS
        value: 60
      - key: INTRADAY_AUTO_CONTINUE_AFTER_CLOSE
        value: true
      - key: INTRADAY_DATA_INTERVAL
        value: 1m
      - key: INTRADAY_MAX_DATA_AGE_MINUTES
        value: 12
      - key: INTRADAY_BLOCK_STALE_DATA
        value: true
      - key: INTRADAY_VOLUME_CONFIRMATION_MODE
        value: soft
      - key: STRICT_INTRADAY_BLOCK_RISK_OFF
        value: false
      - key: STRICT_INTRADAY_BLOCK_MACRO_RISK
        value: false
      - key: INTRADAY_MIN_VOLUME_MULTIPLIER
        value: 0.8
      - key: INTRADAY_MIN_RISK_REWARD
        value: 1.2
      - key: TRADE_COST_MODEL_ENABLED
        value: true
      - key: INDIA_INTRADAY_BROKERAGE_PER_ORDER_INR
        value: 20
      - key: INDIA_INTRADAY_MIN_ROUND_TRIP_COST_INR
        value: 40
      - key: INTRADAY_MIN_EXPECTED_NET_PROFIT_INR
        value: 50
      - key: INTRADAY_MIN_EXPECTED_NET_PROFIT_USD
        value: 1
      - key: INTRADAY_MIN_GROSS_PROFIT_TO_COST_RATIO
        value: 1.5
      - key: INTRADAY_MIN_STOP_LOSS_PCT
        value: 0.25
      - key: INTRADAY_MIN_NET_PROFIT_TO_PROTECT_INR
        value: 25
      - key: TRAILING_STOP_ACTIVATION_PCT
        value: 70
      - key: TRAILING_STOP_GIVEBACK_PCT
        value: 45
      - key: INTRADAY_PROFIT_BOOK_PCT
        value: 0.8
      - key: YF_TIMEOUT
        value: 5
      - key: PAPER_AUTO_ENABLED
        value: true
      - key: PAPER_AUTO_ON_START
        value: true
      - key: PAPER_AUTO_MARKETS
        value: IN,US
      - key: PAPER_AUTO_HORIZONS
        value: day,week
      - key: PAPER_AUTO_INTRADAY_MARKETS
        value: IN,US
      - key: PAPER_AUTO_INTERVAL_SECONDS
        value: 60
      - key: PAPER_AUTO_REQUIRE_MARKET_OPEN
        value: true
      # Groww/live broker execution is optional and must be configured manually.
      - key: BROKER_NAME
        value: groww
      - key: BROKER_ORDER_WEBHOOK_URL
        sync: false
      - key: BROKER_ORDER_WEBHOOK_SECRET
        sync: false
      # Optional: set this if you want to protect POST /api/run-background-scan
      - key: BACKGROUND_SCAN_SECRET
        sync: false
      - key: INTRADAY_PRICE_FILTER_ENABLED
        value: "true"
      - key: INTRADAY_MIN_STOCK_PRICE_INR
        value: "50"
      - key: INTRADAY_MAX_STOCK_PRICE_INR
        value: "1500"
      - key: INTRADAY_MIN_ORDER_QUANTITY
        value: "5"
      - key: INTRADAY_MIN_POSITION_VALUE_INR
        value: "10000"
      - key: INTRADAY_MIN_STOCK_PRICE_USD
        value: "2"
      - key: INTRADAY_MAX_STOCK_PRICE_USD
        value: "250"
      - key: INTRADAY_MIN_POSITION_VALUE_USD
        value: "500"
      - key: CLAUDE_INTRADAY_CONTROL_MODE
        value: paper_full_control
      - key: CLAUDE_INTRADAY_MAX_REVIEWS_PER_RUN
        value: "5"
      - key: CLAUDE_INTRADAY_MIN_CONFIDENCE
        value: "70"
      - key: CLAUDE_INTRADAY_TARGET_INSTRUCTION
        value: Maximize net expectancy after all costs. Prefer no trade over a weak trade. Approve only high-quality setups with fresh data, clear momentum, valid stop, realistic target, and enough expected net profit after costs.
